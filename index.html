<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Pong Game</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #000;\n        }\n        canvas {\n            border: 1px solid #fff;\n        }\n        #scoreboard {\n            color: white;\n            font-size: 24px;\n            position: absolute;\n            top: 20px;\n        }\n    </style>\n</head>\n<body>\n    <div id="scoreboard">Player 1: 0 | Player 2: 0</div>\n    <canvas id="pong" width="800" height="400"></canvas>\n    <script>\n        const canvas = document.getElementById('pong');\n        const ctx = canvas.getContext('2d');\n        let player1Score = 0;\n        let player2Score = 0;\n        const ballRadius = 10;\n        let x = canvas.width / 2;\n        let y = canvas.height / 2;\n        let dx = 2;\n        let dy = 2;\n        const paddleHeight = 75;\n        const paddleWidth = 10;\n        let player1Y = (canvas.height - paddleHeight) / 2;\n        let player2Y = (canvas.height - paddleHeight) / 2;\n\n        function drawBall() {\n            ctx.beginPath();\n            ctx.arc(x, y, ballRadius, 0, Math.PI * 2);\n            ctx.fillStyle = '#fff';\n            ctx.fill();\n            ctx.closePath();\n        }\n\n        function drawPaddles() {\n            ctx.fillStyle = '#fff';\n            ctx.fillRect(0, player1Y, paddleWidth, paddleHeight);\n            ctx.fillRect(canvas.width - paddleWidth, player2Y, paddleWidth, paddleHeight);\n        }\n\n        function drawScore() {\n            document.getElementById('scoreboard').innerText = `Player 1: ${player1Score} | Player 2: ${player2Score}`;\n        }\n\n        function draw() {\n            ctx.clearRect(0, 0, canvas.width, canvas.height);\n            drawBall();\n            drawPaddles();\n            drawScore();\n\n            if (y + dy > canvas.height - ballRadius || y + dy < ballRadius) {\n                dy = -dy;\n            }\n            if (x + dx > canvas.width - ballRadius) {\n                player1Score++;\n                resetBall();\n            } else if (x + dx < ballRadius) {\n                player2Score++;\n                resetBall();\n            }\n            x += dx;\n            y += dy;\n        }\n\n        function resetBall() {\n            x = canvas.width / 2;\n            y = canvas.height / 2;\n            dx = -dx;\n        }\n\n        document.addEventListener('mousemove', (event) => {\n            const relativeY = event.clientY - canvas.getBoundingClientRect().top;\n            if (relativeY > 0 && relativeY < canvas.height) {\n                player1Y = relativeY - paddleHeight / 2;\n            }\n        });\n\n        setInterval(draw, 10);\n    </script>\n</body>\n</html>
