<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;\
        height: 100vh;
        background-color: #000;
        }
      canvas {
        border: 1px solid #fff;
        }
      #scoreboard {
        color: white;
        font-size: 24px;
        position: absolute;
        top: 20px;
        }
      /* Style for the Pong game */

body {
    margin: 0;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: black;
    color: white;
    font-family: Arial, sans-serif;
}

#gameCanvas {
    border: 2px solid white;
}

.scoreboard {
    display: flex;
    justify-content: space-between;
    width: 100%;
    font-size: 24px;
    margin-bottom: 10px;
}

.score {
    padding: 10px;
    background-color: rgba(255, 255, 255, 0.2);
    border-radius: 5px;
}

/* Overall page styling */
h1 {
    color: white;
    text-align: center;
}
      </style>
  </head>
  <body>
    <div id="scoreboard">Player 1: 0 | Player 2: 0</div>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
      const canvas = document.getElementById('pong');
      const ctx = canvas.getContext('2d');
      let player1Score = 0;
      let player2Score = 0;
      const ballRadius = 10;
      let x = canvas.width / 2;
      let y = canvas.height / 2;
      let dx = 2;
      let dy = 2;
      const paddleHeight = 75;
      const paddleWidth = 10;
      let player1Y = (canvas.height - paddleHeight) / 2;
      let player2Y = (canvas.height - paddleHeight) / 2;
      
      function drawBall() {
        ctx.beginPath();
        ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.closePath();
        }
      
      function drawPaddles() {
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, player1Y, paddleWidth, paddleHeight);
        ctx.fillRect(canvas.width - paddleWidth, player2Y, paddleWidth, paddleHeight);
        }
      
      function drawScore() {
        document.getElementById('scoreboard').innerText = `Player 1: ${player1Score} | Player 2: ${player2Score}`;
      }
      
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBall();
        drawPaddles();
        drawScore();
        if (y + dy > canvas.height - ballRadius || y + dy < ballRadius) {
          dy = -dy;
        }
        if (x + dx > canvas.width - ballRadius) {
          player1Score++;
          0resetBall();
        } else if (x + dx < ballRadius) {
          player2Score++;
          resetBall();
        }
        x += dx;
        y += dy;
      }
      
      function resetBall() {
        x = canvas.width / 2;
        y = canvas.height / 2;
        dx = -dx;
      }
      
      document.addEventListener('mousemove', (event) => {
        const relativeY = event.clientY - canvas.getBoundingClientRect().top;
        if (relativeY > 0 && relativeY < canvas.height) {
          player1Y = relativeY - paddleHeight / 2;
          }
          });
      
      setInterval(draw, 10);
      // Pong Game.js

const canvas = document.getElementById('pong');
const context = canvas.getContext('2d');

// Create the pong paddle
const paddleWidth = 10;
const paddleHeight = 100;
const player = { x: 0, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: '#00f' };
const computer = { x: canvas.width - paddleWidth, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight, color: '#f00' };

// Create the pong ball
const ballSize = 10;
const ball = { x: canvas.width / 2 - ballSize / 2, y: canvas.height / 2 - ballSize / 2, size: ballSize, speed: 5, dx: 5, dy: 5 };

let playerScore = 0;
let computerScore = 0;

// Draw everything
function draw() {
    // Clear the canvas
    context.clearRect(0, 0, canvas.width, canvas.height);

    // Draw paddles
    context.fillStyle = player.color;
    context.fillRect(player.x, player.y, player.width, player.height);
    context.fillStyle = computer.color;
    context.fillRect(computer.x, computer.y, computer.width, computer.height);

    // Draw ball
    context.fillStyle = '#fff';
    context.fillRect(ball.x, ball.y, ball.size, ball.size);

    // Draw scores
    context.font = '20px Arial';
    context.fillText(playerScore, canvas.width / 4, 20);
    context.fillText(computerScore, 3 * canvas.width / 4, 20);
}

// Update game logic
function update() {
    // Move the ball
    ball.x += ball.dx;
    ball.y += ball.dy;

    // Wall collision detection
    if (ball.y + ball.size > canvas.height || ball.y < 0) {
        ball.dy *= -1;
    }

    // Paddle collision detection
    if (ball.x < player.x + player.width && ball.y + ball.size > player.y && ball.y < player.y + player.height) {
        ball.dx *= -1;
    }
    if (ball.x + ball.size > computer.x && ball.y + ball.size > computer.y && ball.y < computer.y + computer.height) {
        ball.dx *= -1;
    }

    // Score update
    if (ball.x < 0) {
        computerScore++;
        resetBall();
    } else if (ball.x + ball.size > canvas.width) {
        playerScore++;
        resetBall();
    }

    // Computer AI
    if (computer.y < ball.y) {
        computer.y += 4;
    } else {
        computer.y -= 4;
    }
}

// Reset ball to center
function resetBall() {
    ball.x = canvas.width / 2 - ball.size / 2;
    ball.y = canvas.height / 2 - ball.size / 2;
    ball.dx *= -1;
}

// Game loop
function gameLoop() {
    draw();
    update();
    requestAnimationFrame(gameLoop);
}

document.addEventListener('mousemove', (event) => {
    const mouseY = event.clientY - canvas.getBoundingClientRect().top;
    if (mouseY >= 0 && mouseY <= canvas.height - player.height) {
        player.y = mouseY;
    }
});

// Start the game
requestAnimationFrame(gameLoop);
      </script>
    </body>
  </html>
